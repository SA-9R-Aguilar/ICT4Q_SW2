<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Classmate Information System</title>

<style>
        body {
            background-image: url("https://cdn.wallpapersafari.com/64/94/qc7i1r.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
            }

        .btn, .btn-primary {
            width: 100%;
            padding: 10px;
            background-color: #87b4cc;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .btn-info {
            border:3px solid #598dc9;
        }

        .btn:hover {
            background-color: #4373ab;
            color:white;
        }

        .btn-info:hover {
            border:3px solid #153152;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 10px; 
        }

        hr {
            height: 0;
            border: 0;
            border-top: 10px solid #d64772;
            border-radius: 10px;
        }

        .card {
            border:5px solid #87b4cc;
            border-radius: 5px;
        }
    
</style>
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4" style="width: 800px;">
        <h2 class="text-center mb-4">Classmate Information System</h2>
            <p class="text-center">"Because We're Better Together!"</p>
            <hr>
            <br>    

        <form>
            <h3>Student Adder</h3>
            <br>
            <div class="mb-3">
                <input type="text" id="name" class="form-control" placeholder="What is your name?">
            </div>
             <div class="mb-3">
                <input type="text" id="type" class="form-control" placeholder="What is your occupation?">
            </div>
            <div class="mb-3">
                <input type="text" id="section" class="form-control" placeholder="Where are you from?">
            </div>
            <div class="mb-3">
                <input type="text" id="favSubject" class="form-control" placeholder="What do you love?">
            </div>
            <br>

            <div class="button-container">
                    <input type="button" py-click="classmate_creation" value="Add" class="btn btn-primary">
                    <input type="button" py-click="introduce" value="Show list" class="btn btn-info">         
            </div>
        </form>

        <div id="output" class="mt-3 text-center"></div>

        <hr id="blush">

        <div>
            <h3>Student List</h3>
            <p><ul id="studentList"></ul></p>
        </div>
    </div>

    <py-script src="main.py"></py-script>
</body>
</html>
